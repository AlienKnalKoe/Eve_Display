# ============================================================
# Eve Display — Dark Theme Starter
# Based on alaltitov/Guition-ESP32-S3-4848S040 (MIT licence)
#
# Usage: add to your main ESPHome config as a package:
#   packages:
#     theme: !include eve_display_theme_starter.yaml
#
# Requires:
#   - assets/fonts/Nunito-SemiBold.ttf   (from the repo)
#   - assets/fonts/icons_v2.ttf          (from the repo)
#   - images/eve_placeholder.png         (300x300 ARGB PNG)
#
# Download fonts from:
#   https://github.com/alaltitov/Guition-ESP32-S3-4848S040/tree/2026.1.4/src/assets/fonts
# ============================================================


# ── Colour palette ───────────────────────────────────────────
color:
  - id: color_black
    hex: "0d0d0d"
  - id: color_slate_blue_gray     # card / panel background
    hex: "343645"
  - id: color_steel_blue          # secondary icon / border
    hex: "606682"
  - id: color_misty_blue          # primary text / icons
    hex: "9BA2BC"
  - id: color_sky_blue            # accent blue
    hex: "3FA7F3"
  - id: color_red
    hex: "ff0000"
  - id: color_blue
    hex: "4C9FFF"


# ── Fonts ────────────────────────────────────────────────────
font:
  # Main text — Nunito SemiBold
  - file: "assets/fonts/Nunito-SemiBold.ttf"
    id: nunito_16
    size: 16
    bpp: 4
    glyphsets: [GF_Latin_Core]

  - file: "assets/fonts/Nunito-SemiBold.ttf"
    id: nunito_20
    size: 20
    bpp: 4
    glyphsets: [GF_Latin_Core]

  - file: "assets/fonts/Nunito-SemiBold.ttf"
    id: nunito_30
    size: 30
    bpp: 4
    glyphsets: [GF_Latin_Core]

  - file: "assets/fonts/Nunito-SemiBold.ttf"
    id: nunito_64
    size: 64
    bpp: 4
    glyphsets: [GF_Latin_Core]

  # Custom icon font (wifi, lock, humidity, temp icons)
  - file: "assets/fonts/icons_v2.ttf"
    id: icons_24
    size: 24
    bpp: 4
    glyphs:
      - "\U0000e92e"   # lock
      - "\U0000e934"   # wifi 100%
      - "\U0000e931"   # wifi 25%
      - "\U0000e932"   # wifi 50%
      - "\U0000e933"   # wifi 75%
      - "\U0000e938"   # humidity
      - "\U0000e939"   # temperature

  # MDI icons — standard ESPHome declaration
  - file: "https://esphome.io/_static/materialdesignicons-webfont.ttf"
    id: mdi_icons_28
    size: 28
    bpp: 4
    glyphs:
      - "\U000F07D0"   # home-assistant
      - "\U000F056E"   # view-dashboard (devices)
      - "\U000F06A1"   # home
      - "\U000F18F6"   # weather-cloudy
      - "\U000F1C70"   # information-outline
      - "\U000F08BB"   # cog (settings)
      - "\U000F04B2"   # sleep
      - "\U000F0341"   # lock-outline


# ── Eve character image ──────────────────────────────────────
image:
  - file: "images/eve_placeholder.png"
    id: eve_sprite
    type: ARGB8888
    use_transparency: true


# ── LVGL layout ──────────────────────────────────────────────
lvgl:
  pages:
    - id: home_page
      bg_color: color_black
      scrollable: false
      widgets:

        # ── TOP STATUS BAR ──────────────────────────────────
        - obj:
            id: status_bar
            y: 10
            width: 460
            height: 40
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            widgets:

              # WiFi icon (left)
              - label:
                  id: wifi_status
                  align: left_mid
                  x: 20
                  text: "\ue934"        # wifi 100% — update in wifi on_connect callback
                  text_font: icons_24
                  text_color: color_steel_blue

              # Home Assistant API connected (left)
              - label:
                  id: ha_status
                  align: left_mid
                  x: 60
                  text: "\uF07D0"
                  text_font: mdi_icons_28
                  text_color: color_steel_blue

              # Lock icon (left) — grey = unlocked, misty_blue = locked
              - label:
                  id: lock_status
                  align: left_mid
                  x: 102
                  text: "\ue92e"
                  text_font: icons_24
                  text_color: color_steel_blue


        # ── MAIN CARD (dark rounded panel) ──────────────────
        - obj:
            id: main_card
            y: 60
            width: 440
            height: 270
            align: top_mid
            radius: 20
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            scrollable: false
            widgets:

              # ── Clock ──────────────────────────────────────
              - label:
                  id: time_value
                  y: 12
                  align: top_mid
                  text_font: nunito_64
                  text_color: color_misty_blue
                  text: "00:00"

              # Divider line under clock
              - obj:
                  y: 84
                  align: top_mid
                  width: 380
                  height: 2
                  bg_color: color_misty_blue
                  border_opa: transp
                  shadow_opa: transp
                  clickable: false

              # Day of week (bottom left of card)
              - label:
                  id: day_of_week_value
                  x: 30
                  y: -20
                  align: bottom_left
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Saturday"

              # Date (bottom right of card)
              - label:
                  id: date_value
                  x: -30
                  y: -20
                  align: bottom_right
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "7, March"


        # ── MIDDLE ROW: left button | Eve | right button ────
        - obj:
            id: middle_row
            y: 0
            width: 440
            height: 130
            align: center
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              # LEFT round button (notifications / alerts)
              - obj:
                  id: left_btn_bg
                  x: 30
                  align: left_mid
                  width: 70
                  height: 70
                  radius: 35
                  pad_all: 0
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_width: 8
                  shadow_ofs_y: 0
                  shadow_color: color_black
                  shadow_opa: cover
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF07D0"   # replace with your preferred icon

              # CENTER: Eve character sprite
              - obj:
                  id: eve_circle
                  align: center
                  width: 160
                  height: 160
                  radius: 80
                  pad_all: 0
                  bg_color: color_black
                  border_opa: transp
                  shadow_opa: transp
                  clickable: false
                  widgets:
                    - image:
                        id: eve_image
                        align: center
                        src: eve_sprite
                        # To apply day/night tint at runtime:
                        #   lvgl.image.update:
                        #     id: eve_image
                        #     img_recolor: 0x000000
                        #     img_recolor_opa: 40%

              # RIGHT round button (devices / scenes)
              - obj:
                  id: right_btn_bg
                  x: -30
                  align: right_mid
                  width: 70
                  height: 70
                  radius: 35
                  pad_all: 0
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_width: 8
                  shadow_ofs_y: 0
                  shadow_color: color_black
                  shadow_opa: cover
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF056E"   # view-dashboard


        # ── STAT ROW (CPU temp · Solar · Inside temp) ───────
        # Uncomment when your HA sensors are ready
        #
        # - obj:
        #     id: stat_row
        #     y: -70
        #     width: 440
        #     height: 40
        #     align: bottom_mid
        #     pad_all: 0
        #     bg_color: color_slate_blue_gray
        #     radius: 10
        #     border_opa: transp
        #     shadow_opa: transp
        #     clickable: false
        #     widgets:
        #       - label:
        #           id: cpu_temp_label
        #           align: left_mid
        #           x: 20
        #           text_font: nunito_16
        #           text_color: color_misty_blue
        #           text: "CPU 45°"
        #       - label:
        #           id: solar_label
        #           align: center
        #           text_font: nunito_16
        #           text_color: color_misty_blue
        #           text: "☀ 2.4 kW"
        #       - label:
        #           id: inside_temp_label
        #           align: right_mid
        #           x: -20
        #           text_font: nunito_16
        #           text_color: color_misty_blue
        #           text: "21.5°"


        # ── BOTTOM NAV BAR ───────────────────────────────────
        - obj:
            id: bottom_nav
            y: -10
            width: 440
            height: 60
            align: bottom_mid
            radius: 20
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            widgets:

              # Lock button
              - button:
                  id: nav_lock_btn
                  x: 10
                  align: left_mid
                  width: 50
                  height: 50
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF0341"  # lock-outline
                  # on_click: your lock action here

              # Sleep / night mode button
              - button:
                  id: nav_sleep_btn
                  x: 60
                  align: left_mid
                  width: 50
                  height: 50
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF04B2"  # sleep
                  # on_click: trigger night recolor on eve_image

              # Home (centre — active page indicator)
              - button:
                  id: nav_home_btn
                  align: center
                  width: 50
                  height: 50
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_sky_blue   # highlighted = active
                        text: "\uF06A1"  # home

              # Info button
              - button:
                  id: nav_info_btn
                  x: -60
                  align: right_mid
                  width: 50
                  height: 50
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF1C70"  # information

              # Settings button
              - button:
                  id: nav_settings_btn
                  x: -10
                  align: right_mid
                  width: 50
                  height: 50
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF08BB"  # cog / settings


# ── Clock update script ──────────────────────────────────────
# Wire this to your SNTP on_time trigger:
#   time:
#     - platform: sntp
#       on_time:
#         - minutes: '*'
#           seconds: 0
#           then:
#             - script.execute: update_clock

script:
  - id: update_clock
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          char buf[6];
          snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
          lv_label_set_text(id(time_value), buf);

          const char* days[] = {"Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"};
          lv_label_set_text(id(day_of_week_value), days[time.day_of_week]);

          char dbuf[16];
          const char* months[] = {"","January","February","March","April","May","June",
                                   "July","August","September","October","November","December"};
          snprintf(dbuf, sizeof(dbuf), "%d, %s", time.day_of_month, months[time.month]);
          lv_label_set_text(id(date_value), dbuf);
