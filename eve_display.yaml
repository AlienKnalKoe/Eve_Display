# ============================================================
# Eve Display — main config
# Run with: esphome run eve_display.yaml --device COM5
# ============================================================

esphome:
  name: eve-display
  friendly_name: Eve Display
  min_version: 2026.2.0

packages:
  - !include packages/hardware_core.yaml
  - !include packages/sensors.yaml
  - !include common/colors.yaml
  - !include common/fonts.yaml
  - !include eve_display_theme_starter.yaml
