# ============================================================
# Eve Display — Expression System
# 
# Architecture:
#   - Head base: 156×156 circle from eve_placeholder.png
#   - Eyes:  6 variants (eye_0 .. eye_5) — swap for expression
#   - Mouth: 6 variants (mouth_0 .. mouth_5) — swap for expression
#   - 36 possible expressions (6×6)
#
# Currently all eye/mouth slots point to eve_placeholder.png.
# Replace with 120×60 ARGB PNGs (eyes) and 100×50 ARGB PNGs
# (mouth) when artwork is ready.
#
# Global: current_expression  (0-35)
#   eye_index   = current_expression / 6   (0..5)
#   mouth_index = current_expression % 6   (0..5)
#
# Usage:
#   globals.set: { id: current_expression, value: '7' }
#   script.execute: set_expression
#
# Or via HA: sensor.eve_emotion → handle_eve_emotion script
# ============================================================

# ── Expression globals ───────────────────────────────────────
globals:
  - id: current_expression
    type: int
    restore_value: false
    initial_value: '0'

  - id: is_night_mode
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: night_brightness_cap
    type: float
    restore_value: false
    initial_value: '0.4'

# ── Eye & Mouth sprite images ────────────────────────────────
# All point to eve_placeholder.png until real sprites are ready.
# Replace with actual eye/mouth PNG files.
image:
  - file: "images/eve_placeholder.png"
    id: eye_0
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: eye_1
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: eye_2
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: eye_3
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: eye_4
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: eye_5
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: mouth_0
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: mouth_1
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: mouth_2
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: mouth_3
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: mouth_4
    type: RGB
    transparency: alpha_channel

  - file: "images/eve_placeholder.png"
    id: mouth_5
    type: RGB
    transparency: alpha_channel

# ── Expression scripts ───────────────────────────────────────
script:

  # set_expression: apply current_expression global to display
  # Call after setting current_expression
  #
  # NOTE: When real eye/mouth sprites are ready, replace this with
  #       layered image updates via lvgl.image.update on eve_eye_layer
  #       and eve_mouth_layer objects. For now, recolors the full eve_image
  #       to give visual feedback that an expression changed.
  - id: set_expression
    then:
      - lambda: |-
          int expr = id(current_expression);
          if (expr < 0) expr = 0;
          if (expr > 35) expr = 35;

          int eye_idx   = expr / 6;
          int mouth_idx = expr % 6;

          ESP_LOGI("expr", "Expression %d: eye=%d mouth=%d", expr, eye_idx, mouth_idx);

          // Colour tint on eve_image to indicate emotion family
          // Replace with actual sprite swap when artwork is ready
          lv_color_t tint;
          uint8_t opa = 30;
          switch (eye_idx) {
            case 0: tint = lv_color_hex(0xf2f0eb); opa = 0;   break; // neutral — no tint
            case 1: tint = lv_color_hex(0x39d19c); opa = 40;  break; // happy — mint
            case 2: tint = lv_color_hex(0xe7c12c); opa = 40;  break; // excited — yellow
            case 3: tint = lv_color_hex(0x3FA7F3); opa = 40;  break; // surprised — blue
            case 4: tint = lv_color_hex(0x926BC7); opa = 35;  break; // thinking — violet
            case 5: tint = lv_color_hex(0x606682); opa = 50;  break; // sleepy — gray
            default: tint = lv_color_hex(0x000000); opa = 0; break;
          }
          lv_obj_set_style_img_recolor(id(eve_image), tint, 0);
          lv_obj_set_style_img_recolor_opa(id(eve_image), opa, 0);

  # Map HA emotion string → expression index
  - id: handle_eve_emotion
    then:
      - lambda: |-
          std::string emotion = id(ha_eve_emotion).state;
          int expr = 0;  // neutral default

          if      (emotion == "happy")     expr = 1;
          else if (emotion == "excited")   expr = 2;
          else if (emotion == "surprised") expr = 3;
          else if (emotion == "thinking")  expr = 4;
          else if (emotion == "sleepy")    expr = 5;
          else if (emotion == "sad")       expr = 6;
          else if (emotion == "confused")  expr = 7;
          else if (emotion == "angry")     expr = 12;
          else if (emotion == "blush")     expr = 13;
          else if (emotion == "wink")      expr = 8;
          else if (emotion == "love")      expr = 9;
          else if (emotion == "curious")   expr = 10;
          else if (emotion == "bored")     expr = 11;

          id(current_expression) = expr;
      - script.execute: set_expression
