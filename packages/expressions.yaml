# ============================================================
# Eve Display — Expression System
#
# Architecture:
#   Head:  6 variants (head_colored, head_blond, head_black, head_brown, head_blue, head_kroes)
#          Resized to 156×156 to fit the eve_circle container
#   Eyes:  2 variants (eye_open, eye_closed)
#          Resized to 80×33 — overlaid on head at y≈55
#   Mouth: 6 variants (normal, happy, smile_closed, open, surprised, closed)
#          Resized to 55×33 — overlaid on head at y≈100
#
# Global: current_expression (0-35)
#   eye_index   = current_expression / 6  (0=open, 1=closed)
#   mouth_index = current_expression % 6
#
# Head variant: set via set_head_variant script (head_idx 0-5)
# ============================================================

# ── Expression globals ───────────────────────────────────────
globals:
  - id: current_expression
    type: int
    restore_value: false
    initial_value: '0'

  - id: is_night_mode
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: night_brightness_cap
    type: float
    restore_value: false
    initial_value: '0.4'

  - id: current_head_idx
    type: int
    restore_value: false
    initial_value: '0'

# ── Head images (6 variants, 156×156) ────────────────────────
image:
  - file: "images/head-colored.png"
    id: head_colored
    resize: 156x156
    type: RGB565

  - file: "images/head-blond.png"
    id: head_blond
    resize: 156x156
    type: RGB565

  - file: "images/head-black.png"
    id: head_black
    resize: 156x156
    type: RGB565

  - file: "images/head-brown.png"
    id: head_brown
    resize: 156x156
    type: RGB565

  - file: "images/head-blue.png"
    id: head_blue
    resize: 156x156
    type: RGB565

  - file: "images/head-kroes.png"
    id: head_kroes
    resize: 156x156
    type: RGB565

# ── Eye images (2 variants) ───────────────────────────────────
# Sized to ~80×33 relative to 156px head
  - file: "images/eye-open.png"
    id: eye_open
    resize: 80x34
    type: RGB565

  - file: "images/eye-closed.png"
    id: eye_closed
    resize: 80x28
    type: RGB565

# ── Mouth images (6 variants) ─────────────────────────────────
  - file: "images/mouth-normal.png"
    id: mouth_normal
    resize: 55x33
    type: RGB565

  - file: "images/mouth-happy.png"
    id: mouth_happy
    resize: 60x43
    type: RGB565

  - file: "images/Mouth-smile-closed.png"
    id: mouth_smile_closed
    resize: 55x33
    type: RGB565

  - file: "images/mouth-open.png"
    id: mouth_open
    resize: 55x43
    type: RGB565

  - file: "images/mouth-suprised.png"
    id: mouth_surprised
    resize: 50x50
    type: RGB565

  - file: "images/mouth-closed.png"
    id: mouth_closed
    resize: 55x33
    type: RGB565

# ── Heart image (special state) ──────────────────────────────
  - file: "images/heart.png"
    id: heart_sprite
    resize: 80x62
    type: RGB565

# ── Expression scripts ───────────────────────────────────────
script:

  # set_expression: apply current_expression global to display
  # eye_index  = expr / 6  →  0=open, 1=closed
  # mouth_index = expr % 6 →  0=normal, 1=happy, 2=smile_closed,
  #                            3=open, 4=surprised, 5=closed
  - id: set_expression
    then:
      - lambda: |-
          int expr = id(current_expression);
          if (expr < 0) expr = 0;
          if (expr > 11) expr = 11;  // 2 eyes × 6 mouths

          int eye_idx   = expr / 6;
          int mouth_idx = expr % 6;

          ESP_LOGI("expr", "Expression %d: eye=%d mouth=%d", expr, eye_idx, mouth_idx);

          // Swap eye image — use get_lv_img_dsc() to obtain lv_img_src_t from Image*
          if (eye_idx == 1)
            lv_img_set_src(id(eve_eye_layer), id(eye_closed)->get_lv_img_dsc());
          else
            lv_img_set_src(id(eve_eye_layer), id(eye_open)->get_lv_img_dsc());

          // Swap mouth image
          if      (mouth_idx == 1) lv_img_set_src(id(eve_mouth_layer), id(mouth_happy)->get_lv_img_dsc());
          else if (mouth_idx == 2) lv_img_set_src(id(eve_mouth_layer), id(mouth_smile_closed)->get_lv_img_dsc());
          else if (mouth_idx == 3) lv_img_set_src(id(eve_mouth_layer), id(mouth_open)->get_lv_img_dsc());
          else if (mouth_idx == 4) lv_img_set_src(id(eve_mouth_layer), id(mouth_surprised)->get_lv_img_dsc());
          else if (mouth_idx == 5) lv_img_set_src(id(eve_mouth_layer), id(mouth_closed)->get_lv_img_dsc());
          else                     lv_img_set_src(id(eve_mouth_layer), id(mouth_normal)->get_lv_img_dsc());

  # set_head_variant: swap Eve's head image (0=colored, 1=blond, 2=black, 3=brown, 4=blue, 5=kroes)
  - id: set_head_variant
    then:
      - lambda: |-
          int idx = id(current_head_idx);
          // Use get_lv_img_dsc() to obtain lv_img_src_t from Image*
          if      (idx == 1) lv_img_set_src(id(eve_image), id(head_blond)->get_lv_img_dsc());
          else if (idx == 2) lv_img_set_src(id(eve_image), id(head_black)->get_lv_img_dsc());
          else if (idx == 3) lv_img_set_src(id(eve_image), id(head_brown)->get_lv_img_dsc());
          else if (idx == 4) lv_img_set_src(id(eve_image), id(head_blue)->get_lv_img_dsc());
          else if (idx == 5) lv_img_set_src(id(eve_image), id(head_kroes)->get_lv_img_dsc());
          else               lv_img_set_src(id(eve_image), id(head_colored)->get_lv_img_dsc());

  # Map HA emotion string → expression index
  - id: handle_eve_emotion
    then:
      - lambda: |-
          std::string emotion = id(ha_eve_emotion).state;
          int expr = 0;  // neutral default (open eyes, normal mouth)

          if      (emotion == "happy")     expr = 1;   // open + happy
          else if (emotion == "excited")   expr = 2;   // open + smile_closed
          else if (emotion == "surprised") expr = 3;   // open + mouth_open
          else if (emotion == "shocked")   expr = 4;   // open + surprised
          else if (emotion == "neutral2")  expr = 5;   // open + closed
          else if (emotion == "sleepy")    expr = 6;   // closed + normal
          else if (emotion == "sleeping")  expr = 7;   // closed + happy
          else if (emotion == "wink")      expr = 8;   // closed + smile_closed
          else if (emotion == "tired_open") expr = 9;  // closed + open
          else if (emotion == "tired_sup") expr = 10;  // closed + surprised
          else if (emotion == "resting")   expr = 11;  // closed + closed

          id(current_expression) = expr;
      - script.execute: set_expression

  # eve_talk: animate mouth open↔normal to simulate speaking
  # Cycles N times (default 4 cycles = ~1.6 seconds)
  # Usage: script.execute: eve_talk
  - id: eve_talk
    mode: single
    then:
      - repeat:
          count: 4
          then:
            - lvgl.image.update:
                id: eve_mouth_layer
                src: mouth_open
            - delay: 200ms
            - lvgl.image.update:
                id: eve_mouth_layer
                src: mouth_normal
            - delay: 200ms

  # eve_blink: single eye blink animation
  - id: eve_blink
    mode: single
    then:
      - lvgl.image.update:
          id: eve_eye_layer
          src: eye_closed
      - delay: 150ms
      - lvgl.image.update:
          id: eve_eye_layer
          src: eye_open

  # eve_auto_blink: periodic blink (call once to start, it restarts itself)
  - id: eve_auto_blink
    mode: restart
    then:
      - delay: 4000ms
      - script.execute: eve_blink
      - delay: 500ms
      - script.execute: eve_auto_blink

