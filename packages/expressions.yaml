# ============================================================
# Eve Display — Expression System
#
# Architecture:
#   Head:  6 variants (head_colored, head_blond, head_black, head_brown, head_blue, head_kroes)
#          Resized to 156×156 to fit the eve_circle container
#   Eyes:  2 variants (eye_open, eye_closed)
#          Resized to 80×33 — overlaid on head at y≈55
#   Mouth: 6 variants (normal, happy, smile_closed, open, surprised, closed)
#          Resized to 55×33 — overlaid on head at y≈100
#
# Global: current_expression (0-35)
#   eye_index   = current_expression / 6  (0=open, 1=closed)
#   mouth_index = current_expression % 6
#
# Head variant: set via set_head_variant script (head_idx 0-5)
# ============================================================

# ── Expression globals ───────────────────────────────────────
globals:
  - id: current_expression
    type: int
    restore_value: false
    initial_value: '0'

  - id: is_night_mode
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: night_brightness_cap
    type: float
    restore_value: false
    initial_value: '0.4'

  - id: current_head_idx
    type: int
    restore_value: false
    initial_value: '0'

# ── Head images (6 variants, 156×156) ────────────────────────
image:
  - file: "images/head-colored.png"
    id: head_colored
    resize: 156x156
    type: RGB
    transparency: alpha_channel

  - file: "images/head-blond.png"
    id: head_blond
    resize: 156x156
    type: RGB
    transparency: alpha_channel

  - file: "images/head-black.png"
    id: head_black
    resize: 156x156
    type: RGB
    transparency: alpha_channel

  - file: "images/head-brown.png"
    id: head_brown
    resize: 156x156
    type: RGB
    transparency: alpha_channel

  - file: "images/head-blue.png"
    id: head_blue
    resize: 156x156
    type: RGB
    transparency: alpha_channel

  - file: "images/head-kroes.png"
    id: head_kroes
    resize: 156x156
    type: RGB
    transparency: alpha_channel

# ── Eye images (2 variants) ───────────────────────────────────
# Sized to ~80×33 relative to 156px head
  - file: "images/eye-open.png"
    id: eye_open
    resize: 80x34
    type: RGB
    transparency: alpha_channel

  - file: "images/eye-closed.png"
    id: eye_closed
    resize: 80x28
    type: RGB
    transparency: alpha_channel

# ── Mouth images (6 variants) ─────────────────────────────────
  - file: "images/mouth-normal.png"
    id: mouth_normal
    resize: 55x33
    type: RGB
    transparency: alpha_channel

  - file: "images/mouth-happy.png"
    id: mouth_happy
    resize: 60x43
    type: RGB
    transparency: alpha_channel

  - file: "images/Mouth-smile-closed.png"
    id: mouth_smile_closed
    resize: 55x33
    type: RGB
    transparency: alpha_channel

  - file: "images/mouth-open.png"
    id: mouth_open
    resize: 55x43
    type: RGB
    transparency: alpha_channel

  - file: "images/mouth-suprised.png"
    id: mouth_surprised
    resize: 50x50
    type: RGB
    transparency: alpha_channel

  - file: "images/mouth-closed.png"
    id: mouth_closed
    resize: 55x33
    type: RGB
    transparency: alpha_channel

# ── Heart image (special state) ──────────────────────────────
  - file: "images/heart.png"
    id: heart_sprite
    resize: 80x62
    type: RGB
    transparency: alpha_channel

# ── Expression scripts ───────────────────────────────────────
script:

  # set_expression: apply current_expression global to display
  # eye_index  = expr / 6  →  0=open, 1=closed
  # mouth_index = expr % 6 →  0=normal, 1=happy, 2=smile_closed,
  #                            3=open, 4=surprised, 5=closed
  - id: set_expression
    then:
      - lambda: |-
          int expr = id(current_expression);
          if (expr < 0) expr = 0;
          if (expr > 11) expr = 11;  // 2 eyes × 6 mouths

          int eye_idx   = expr / 6;
          int mouth_idx = expr % 6;

          ESP_LOGI("expr", "Expression %d: eye=%d mouth=%d", expr, eye_idx, mouth_idx);

          // Swap eye image
          lv_img_src_t eye_src;
          switch (eye_idx) {
            case 1:  eye_src = &id(eye_closed);  break;
            default: eye_src = &id(eye_open);    break;
          }
          lv_img_set_src(id(eve_eye_layer), eye_src);

          // Swap mouth image
          lv_img_src_t mouth_src;
          switch (mouth_idx) {
            case 1:  mouth_src = &id(mouth_happy);        break;
            case 2:  mouth_src = &id(mouth_smile_closed); break;
            case 3:  mouth_src = &id(mouth_open);         break;
            case 4:  mouth_src = &id(mouth_surprised);    break;
            case 5:  mouth_src = &id(mouth_closed);       break;
            default: mouth_src = &id(mouth_normal);       break;
          }
          lv_img_set_src(id(eve_mouth_layer), mouth_src);

  # set_head_variant: swap Eve's head image (0=colored, 1=blond, 2=black, 3=brown, 4=blue, 5=kroes)
  - id: set_head_variant
    then:
      - lambda: |-
          int idx = id(current_head_idx);
          lv_img_src_t src;
          switch (idx) {
            case 1:  src = &id(head_blond);   break;
            case 2:  src = &id(head_black);   break;
            case 3:  src = &id(head_brown);   break;
            case 4:  src = &id(head_blue);    break;
            case 5:  src = &id(head_kroes);   break;
            default: src = &id(head_colored); break;
          }
          lv_img_set_src(id(eve_image), src);

  # Map HA emotion string → expression index
  - id: handle_eve_emotion
    then:
      - lambda: |-
          std::string emotion = id(ha_eve_emotion).state;
          int expr = 0;  // neutral default (open eyes, normal mouth)

          if      (emotion == "happy")     expr = 1;   // open + happy
          else if (emotion == "excited")   expr = 2;   // open + smile_closed
          else if (emotion == "surprised") expr = 3;   // open + mouth_open
          else if (emotion == "shocked")   expr = 4;   // open + surprised
          else if (emotion == "neutral2")  expr = 5;   // open + closed
          else if (emotion == "sleepy")    expr = 6;   // closed + normal
          else if (emotion == "sleeping")  expr = 7;   // closed + happy
          else if (emotion == "wink")      expr = 8;   // closed + smile_closed
          else if (emotion == "tired_open") expr = 9;  // closed + open
          else if (emotion == "tired_sup") expr = 10;  // closed + surprised
          else if (emotion == "resting")   expr = 11;  // closed + closed

          id(current_expression) = expr;
      - script.execute: set_expression

