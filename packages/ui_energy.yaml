# ============================================================
# Eve Display — Energy / Stats Page (Page 2)
# Shows: grid consumption, solar production, net usage
# HA sensors: sensor.electricity_meter_energieverbruik
#             sensor.solaredge_current_power
# ============================================================

lvgl:
  pages:
    - id: energy_page
      bg_color: color_black
      scrollable: false
      widgets:

        # ── TOP STATUS BAR ───────────────────────────────────
        - obj:
            id: energy_status_bar
            y: 8
            width: 460
            height: 40
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            widgets:

              - label:
                  id: wifi_status_energy
                  align: left_mid
                  x: 16
                  text: "\ue934"
                  text_font: icons_24
                  text_color: color_steel_blue

              - label:
                  id: ha_status_energy
                  align: left_mid
                  x: 52
                  text: "\uF07D0"
                  text_font: mdi_icons_28
                  text_color: color_steel_blue

              - label:
                  align: center
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "Energy"

              - label:
                  id: energy_time
                  align: right_mid
                  x: -16
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "00:00"

        # ── GRID USAGE ARC ───────────────────────────────────
        - obj:
            id: grid_arc_container
            y: 60
            width: 200
            height: 200
            align: top_left
            x: 16
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              - arc:
                  id: grid_arc
                  align: center
                  width: 180
                  height: 180
                  arc_color: color_deep_orange
                  arc_width: 12
                  indicator:
                    arc_color: color_orange
                    arc_width: 12
                  bg_color: color_slate_blue_gray
                  value: 0
                  min_value: 0
                  max_value: 6000
                  start_angle: 135
                  end_angle: 45
                  adjustable: false

              # Center: usage watts
              - label:
                  id: grid_power_value
                  align: center
                  y: -10
                  text_font: nunito_36
                  text_color: color_orange
                  text: "-- W"

              - label:
                  align: center
                  y: 30
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Grid"

              # Icon top-center of arc
              - label:
                  align: top_mid
                  y: 10
                  text_font: mdi_icons_28
                  text_color: color_orange
                  text: "\uF0241"   # flash

        # ── SOLAR ARC ────────────────────────────────────────
        - obj:
            id: solar_arc_container
            y: 60
            width: 200
            height: 200
            align: top_right
            x: -16
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              - arc:
                  id: solar_arc
                  align: center
                  width: 180
                  height: 180
                  arc_color: color_dark_gray
                  arc_width: 12
                  indicator:
                    arc_color: color_yellow
                    arc_width: 12
                  bg_color: color_slate_blue_gray
                  value: 0
                  min_value: 0
                  max_value: 6000
                  start_angle: 135
                  end_angle: 45
                  adjustable: false

              - label:
                  id: solar_power_value
                  align: center
                  y: -10
                  text_font: nunito_36
                  text_color: color_yellow
                  text: "-- W"

              - label:
                  align: center
                  y: 30
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Solar"

              - label:
                  align: top_mid
                  y: 10
                  text_font: mdi_icons_28
                  text_color: color_yellow
                  text: "\uF1107"   # solar panel icon

        # ── NET USAGE CARD ───────────────────────────────────
        - obj:
            id: net_card
            y: 272
            width: 440
            height: 80
            align: top_mid
            radius: 16
            pad_left: 20
            pad_right: 20
            pad_top: 8
            pad_bottom: 8
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:
              - label:
                  align: left_mid
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Net"
              - label:
                  id: net_power_value
                  align: center
                  text_font: nunito_36
                  text_color: color_mint
                  text: "-- W"
              - label:
                  id: net_power_direction
                  align: right_mid
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "balanced"

        # ── QUICK STATS ROW ──────────────────────────────────
        - obj:
            id: energy_stats_row
            y: 366
            width: 440
            height: 64
            align: top_mid
            radius: 16
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:
              # Grid cost today (placeholder)
              - obj:
                  align: left_mid
                  x: 16
                  width: 120
                  height: 52
                  bg_opa: transp
                  border_opa: transp
                  shadow_opa: transp
                  widgets:
                    - label:
                        align: top_mid
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Today Grid"
                    - label:
                        id: grid_today_value
                        align: bottom_mid
                        text_font: nunito_20
                        text_color: color_orange
                        text: "-- kWh"

              # Separator
              - obj:
                  align: center
                  x: 0
                  width: 2
                  height: 40
                  bg_color: color_steel_blue
                  border_opa: transp
                  shadow_opa: transp
                  clickable: false

              # Solar today (placeholder)
              - obj:
                  align: right_mid
                  x: -16
                  width: 120
                  height: 52
                  bg_opa: transp
                  border_opa: transp
                  shadow_opa: transp
                  widgets:
                    - label:
                        align: top_mid
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Today Solar"
                    - label:
                        id: solar_today_value
                        align: bottom_mid
                        text_font: nunito_20
                        text_color: color_yellow
                        text: "-- kWh"

        # ── BOTTOM NAV ───────────────────────────────────────
        - obj:
            id: energy_bottom_nav
            y: 444
            width: 460
            height: 30
            align: top_mid
            radius: 0
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            widgets:
              - button:
                  align: left_mid
                  x: 20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: home_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF06A1"

              - button:
                  align: left_mid
                  x: 90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_sky_blue
                        text: "\uF0241"

              - button:
                  align: center
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: weather_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF0F9B"

              - button:
                  align: right_mid
                  x: -90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: scenes_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF056E"

              - button:
                  align: right_mid
                  x: -20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - script.execute: trigger_night_mode
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF04B2"

# ── Energy page update script ────────────────────────────────
script:
  - id: update_energy_page
    then:
      - lambda: |-
          // Grid usage
          float grid_w = id(ha_electricity_usage).state;
          if (!std::isnan(grid_w)) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f W", grid_w);
            lv_label_set_text(id(grid_power_value), buf);

            int arc_val = (int)std::min(grid_w, 6000.0f);
            lv_arc_set_value(id(grid_arc), arc_val);
          }

          // Solar power
          float solar_w = id(ha_solar_power).state;
          if (!std::isnan(solar_w)) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f W", solar_w);
            lv_label_set_text(id(solar_power_value), buf);

            int arc_val = (int)std::min(solar_w, 6000.0f);
            lv_arc_set_value(id(solar_arc), arc_val);
          }

          // Net: solar minus grid
          if (!std::isnan(grid_w) && !std::isnan(solar_w)) {
            float net = solar_w - grid_w;
            char buf[24];
            snprintf(buf, sizeof(buf), "%.0f W", std::abs(net));
            lv_label_set_text(id(net_power_value), buf);

            if (net > 50) {
              lv_label_set_text(id(net_power_direction), "feeding grid");
              lv_obj_set_style_text_color(id(net_power_value),
                lv_color_hex(0x39d19c), 0);  // mint
            } else if (net < -50) {
              lv_label_set_text(id(net_power_direction), "from grid");
              lv_obj_set_style_text_color(id(net_power_value),
                lv_color_hex(0xf07c40), 0);  // orange
            } else {
              lv_label_set_text(id(net_power_direction), "balanced");
              lv_obj_set_style_text_color(id(net_power_value),
                lv_color_hex(0x9BA2BC), 0);  // misty blue
            }
          }

          // Sync time label
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            char tbuf[6];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d", time.hour, time.minute);
            lv_label_set_text(id(energy_time), tbuf);
          }
