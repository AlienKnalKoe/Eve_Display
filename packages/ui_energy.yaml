# ============================================================
# Eve Display — Energy / Stats Page (Page 2)
# Shows: grid consumption, solar production, net usage
# HA sensors: sensor.electricity_meter_energieverbruik
#             sensor.solaredge_current_power
# ============================================================

script:
  - id: update_energy_page
    then:
      - lambda: |-
          // Grid usage
          float grid_w = id(ha_electricity_usage).state;
          if (!std::isnan(grid_w)) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f W", grid_w);
            lv_label_set_text(id(grid_power_value), buf);

            int arc_val = (int)std::min(grid_w, 6000.0f);
            lv_arc_set_value(id(grid_arc), arc_val);
          }

          // Solar power
          float solar_w = id(ha_solar_power).state;
          if (!std::isnan(solar_w)) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f W", solar_w);
            lv_label_set_text(id(solar_power_value), buf);

            int arc_val = (int)std::min(solar_w, 6000.0f);
            lv_arc_set_value(id(solar_arc), arc_val);
          }

          // Net: solar minus grid
          if (!std::isnan(grid_w) && !std::isnan(solar_w)) {
            float net = solar_w - grid_w;
            char buf[24];
            snprintf(buf, sizeof(buf), "%.0f W", std::abs(net));
            lv_label_set_text(id(net_power_value), buf);

            if (net > 50) {
              lv_label_set_text(id(net_power_direction), "feeding grid");
              lv_obj_set_style_text_color(id(net_power_value),
                lv_color_hex(0x39d19c), 0);  // mint
            } else if (net < -50) {
              lv_label_set_text(id(net_power_direction), "from grid");
              lv_obj_set_style_text_color(id(net_power_value),
                lv_color_hex(0xf07c40), 0);  // orange
            } else {
              lv_label_set_text(id(net_power_direction), "balanced");
              lv_obj_set_style_text_color(id(net_power_value),
                lv_color_hex(0x9BA2BC), 0);  // misty blue
            }
          }

          // Sync time label
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            char tbuf[6];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d", time.hour, time.minute);
            lv_label_set_text(id(energy_time), tbuf);
          }
