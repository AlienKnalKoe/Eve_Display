# ── LVGL home page ───────────────────────────────────────────

script:
  - id: idle_dimmer_script
    mode: restart
    then:
      - delay: 60s
      - script.execute: apply_idle_dim

  - id: update_clock
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (!time.is_valid()) return;

          // Main clock label
          char buf[6];
          snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
          lv_label_set_text(id(time_value), buf);
          lv_label_set_text(id(status_time), buf);

          // Day of week
          // ESPHome day_of_week: 1=Sunday, 2=Monday ... 7=Saturday
          const char* days[] = {
            "", "Sunday","Monday","Tuesday","Wednesday",
            "Thursday","Friday","Saturday"
          };
          int dow = time.day_of_week;
          if (dow >= 1 && dow <= 7)
            lv_label_set_text(id(day_of_week_value), days[dow]);

          // Date  "8, March"
          const char* months[] = {
            "","January","February","March","April","May","June",
            "July","August","September","October","November","December"
          };
          char dbuf[20];
          snprintf(dbuf, sizeof(dbuf), "%d, %s", time.day_of_month, months[time.month]);
          lv_label_set_text(id(date_value), dbuf);

