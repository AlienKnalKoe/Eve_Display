esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      # SPIRAM_FETCH_INSTRUCTIONS/RODATA disabled: these put WiFi driver code in PSRAM,
      # which shares bandwidth with the RGB display DMA → WiFi fails to connect.
      # WiFi IRAM ops must run from real IRAM to coexist with the RGB LCD DMA.
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "n"
      CONFIG_SPIRAM_RODATA: "n"
      # 32-byte cache lines reduce PSRAM bandwidth use by RGB DMA → fixes flickering
      CONFIG_ESP32S3_DATA_CACHE_LINE_32B: "y"
      # LCD ISR in IRAM — prevents display glitches when flash/cache is busy
      CONFIG_LCD_RGB_ISR_IRAM_SAFE: "y"

psram:
  mode: octal
  speed: 80MHz

spi:
  - id: display_init_spi
    interface: software
    clk_pin: GPIO48
    mosi_pin: GPIO47
    miso_pin: GPIO41

i2c:
  - id: i2c_bus
    sda: GPIO19
    scl:
      number: GPIO45
      ignore_strapping_warning: true

display:
  - platform: mipi_rgb
    model: GUITION-4848S040
    id: my_display
    spi_id: display_init_spi
    auto_clear_enabled: false
    rotation: 90
    pclk_inverted: false   # Fix flickering/ghosting on GUITION-4848S040 RGB panel

touchscreen:
  - platform: gt911
    id: gt911_touch
    display: my_display
    i2c_id: i2c_bus
    address: 0x5D
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: false
    on_touch:
      then:
        - light.turn_on:
            id: display_backlight
            brightness: 100%
        - script.execute: idle_dimmer_script

# Backlight — fixed: 100Hz + min_power 0.01 for smooth dimming across full range
# default_transition_length: 0ms — prevents blink artifact when brightness changes
# gamma_correct: 0 — linear brightness (avoids LEDC gamma-step blink at low values)
output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO38
    frequency: 100Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: "Brightness"
    id: display_backlight
    output: backlight_pwm
    default_transition_length: 0ms
    gamma_correct: 0
    restore_mode: ALWAYS_ON

# ── WiFi ─────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE   # Prevents ESP32 light sleep (fixes display blink)
  fast_connect: true      # Skip full channel scan — connect directly (fixes RF interference with RGB display)
  output_power: 8.5dB     # Reduce TX power for stability (octal PSRAM + RGB bus interferes with antenna)
  reboot_timeout: 0s      # Don't reboot if WiFi drops; reconnect silently
  ap:
    ssid: "Eve-Display-AP"
    password: !secret wifi_password
  on_connect:
    then:
      - lvgl.label.update:
          id: wifi_status
          text: ""
          text_color: color_mint
      - lvgl.label.update:
          id: wifi_status_energy
          text: ""
          text_color: color_mint
      - lvgl.label.update:
          id: wifi_status_weather
          text: ""
          text_color: color_mint
      - lvgl.label.update:
          id: wifi_status_laundry
          text: ""
          text_color: color_mint
      - script.execute: update_ticker
  on_disconnect:
    then:
      - lvgl.label.update:
          id: wifi_status
          text: ""
          text_color: color_crimson
      - lvgl.label.update:
          id: wifi_status_energy
          text: ""
          text_color: color_crimson
      - lvgl.label.update:
          id: wifi_status_weather
          text: ""
          text_color: color_crimson
      - lvgl.label.update:
          id: wifi_status_laundry
          text: ""
          text_color: color_crimson
      - script.execute: update_ticker

