# ============================================================
# Eve Display — Scenes / Quick Control Page (Page 4)
# Quick-tap buttons for common HA scenes and device controls
# ============================================================

lvgl:
  pages:
    - id: scenes_page
      bg_color: color_black
      scrollable: false
      widgets:

        # ── TOP STATUS BAR ───────────────────────────────────
        - obj:
            id: scenes_status_bar
            y: 8
            width: 460
            height: 40
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            widgets:
              - label:
                  align: center
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "Scenes"
              - label:
                  id: scenes_time
                  align: right_mid
                  x: -16
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "00:00"

        # ── SECTION: SCENES ──────────────────────────────────
        - label:
            id: scenes_section_label
            y: 58
            x: 24
            align: top_left
            text_font: nunito_16
            text_color: color_steel_blue
            text: "SCENES"

        # ── SCENE BUTTON GRID (2 × 3 = 6 buttons) ───────────

        # Row 1 — 3 scene buttons
        - obj:
            id: scenes_row1
            y: 78
            width: 440
            height: 100
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              # Button 1: Evening
              - button:
                  id: scene_evening_btn
                  align: left_mid
                  x: 8
                  width: 130
                  height: 90
                  radius: 16
                  pad_all: 8
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: scene.turn_on
                          data:
                            entity_id: scene.evening
                      - script.execute: scene_feedback
                  widgets:
                    - label:
                        align: top_mid
                        y: 6
                        text_font: mdi_icons_40
                        text_color: color_amber
                        text: "\uF0826"   # home
                    - label:
                        align: bottom_mid
                        y: -4
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Evening"

              # Button 2: Night
              - button:
                  id: scene_night_btn
                  align: center
                  width: 130
                  height: 90
                  radius: 16
                  pad_all: 8
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: scene.turn_on
                          data:
                            entity_id: scene.night
                      - script.execute: scene_feedback
                  widgets:
                    - label:
                        align: top_mid
                        y: 6
                        text_font: mdi_icons_52
                        text_color: color_violet
                        text: "\uF1828"   # shield moon
                    - label:
                        align: bottom_mid
                        y: -4
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Night"

              # Button 3: Away
              - button:
                  id: scene_away_btn
                  align: right_mid
                  x: -8
                  width: 130
                  height: 90
                  radius: 16
                  pad_all: 8
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: scene.turn_on
                          data:
                            entity_id: scene.away
                      - script.execute: scene_feedback
                  widgets:
                    - label:
                        align: top_mid
                        y: 6
                        text_font: mdi_icons_40
                        text_color: color_sky_blue
                        text: "\uF0F9B"   # cloud / away
                    - label:
                        align: bottom_mid
                        y: -4
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Away"

        # Row 2 — 3 more scene/device buttons
        - obj:
            id: scenes_row2
            y: 188
            width: 440
            height: 100
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              # Button 4: Morning
              - button:
                  id: scene_morning_btn
                  align: left_mid
                  x: 8
                  width: 130
                  height: 90
                  radius: 16
                  pad_all: 8
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: scene.turn_on
                          data:
                            entity_id: scene.morning
                      - script.execute: scene_feedback
                  widgets:
                    - label:
                        align: top_mid
                        y: 6
                        text_font: mdi_icons_40
                        text_color: color_yellow
                        text: "\uF015B"   # fire/sun
                    - label:
                        align: bottom_mid
                        y: -4
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Morning"

              # Button 5: Movie
              - button:
                  id: scene_movie_btn
                  align: center
                  width: 130
                  height: 90
                  radius: 16
                  pad_all: 8
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: scene.turn_on
                          data:
                            entity_id: scene.movie
                      - script.execute: scene_feedback
                  widgets:
                    - label:
                        align: top_mid
                        y: 6
                        text_font: mdi_icons_40
                        text_color: color_crimson
                        text: "\uF040A"   # play
                    - label:
                        align: bottom_mid
                        y: -4
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Movie"

              # Button 6: All Off
              - button:
                  id: scene_alloff_btn
                  align: right_mid
                  x: -8
                  width: 130
                  height: 90
                  radius: 16
                  pad_all: 8
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: homeassistant.turn_off
                          data:
                            entity_id: group.all_lights
                      - script.execute: scene_feedback
                  widgets:
                    - label:
                        align: top_mid
                        y: 6
                        text_font: mdi_icons_40
                        text_color: color_gray
                        text: "\uF0906"   # power
                    - label:
                        align: bottom_mid
                        y: -4
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "All Off"

        # ── SECTION: QUICK DEVICES ───────────────────────────
        - label:
            id: devices_section_label
            y: 298
            x: 24
            align: top_left
            text_font: nunito_16
            text_color: color_steel_blue
            text: "QUICK DEVICES"

        # Device row — 4 toggle tiles
        - obj:
            id: devices_row
            y: 318
            width: 440
            height: 90
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              # Device 1: Woonkamer light
              - button:
                  id: dev_woonkamer_btn
                  align: left_mid
                  x: 8
                  width: 96
                  height: 80
                  radius: 16
                  pad_all: 6
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: light.toggle
                          data:
                            entity_id: light.woonkamer
                  widgets:
                    - label:
                        align: top_mid
                        y: 4
                        text_font: mdi_icons_40
                        text_color: color_amber
                        text: "\uF0F14"   # ceiling light (fallback: \uF0241)
                    - label:
                        align: bottom_mid
                        y: -2
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Living"

              # Device 2: Slaapkamer
              - button:
                  id: dev_slaapkamer_btn
                  align: left_mid
                  x: 116
                  width: 96
                  height: 80
                  radius: 16
                  pad_all: 6
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: light.toggle
                          data:
                            entity_id: light.slaapkamer
                  widgets:
                    - label:
                        align: top_mid
                        y: 4
                        text_font: mdi_icons_40
                        text_color: color_violet
                        text: "\uF04B2"   # sleep moon
                    - label:
                        align: bottom_mid
                        y: -2
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Bedroom"

              # Device 3: Keuken
              - button:
                  id: dev_keuken_btn
                  align: right_mid
                  x: -116
                  width: 96
                  height: 80
                  radius: 16
                  pad_all: 6
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: light.toggle
                          data:
                            entity_id: light.keuken
                  widgets:
                    - label:
                        align: top_mid
                        y: 4
                        text_font: mdi_icons_40
                        text_color: color_light_mint
                        text: "\uF08DD"   # floor lamp
                    - label:
                        align: bottom_mid
                        y: -2
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Kitchen"

              # Device 4: All toggle
              - button:
                  id: dev_all_btn
                  align: right_mid
                  x: -8
                  width: 96
                  height: 80
                  radius: 16
                  pad_all: 6
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_opa: transp
                  on_click:
                    then:
                      - homeassistant.service:
                          service: light.toggle
                          data:
                            entity_id: group.all_lights
                  widgets:
                    - label:
                        align: top_mid
                        y: 4
                        text_font: mdi_icons_40
                        text_color: color_sky_blue
                        text: "\uF18DD"   # ceiling light multiple
                    - label:
                        align: bottom_mid
                        y: -2
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "All"

        # ── BOTTOM NAV ───────────────────────────────────────
        - obj:
            id: scenes_bottom_nav
            y: 444
            width: 460
            height: 30
            align: top_mid
            radius: 0
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            widgets:
              - button:
                  align: left_mid
                  x: 20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: home_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF06A1"
              - button:
                  align: left_mid
                  x: 90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: energy_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF0241"
              - button:
                  align: center
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: weather_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF0F9B"
              - button:
                  align: right_mid
                  x: -90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_sky_blue
                        text: "\uF056E"
              - button:
                  align: right_mid
                  x: -20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - script.execute: trigger_night_mode
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF04B2"

# ── Scene feedback script (brief visual flash) ───────────────
script:
  - id: scene_feedback
    mode: single
    then:
      - light.turn_on:
          id: display_backlight
          brightness: 100%
      - delay: 200ms
      - script.execute: idle_dimmer_script
