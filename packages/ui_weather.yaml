# ============================================================
# Eve Display — Weather / Climate Page (Page 3)
# Shows: outdoor temp, indoor temp/humidity, weather condition
# HA sensors: sensor.home_temperature, sensor.home_humidity
#             sensor.outdoor_temperature, sensor.weather_condition
# ============================================================

script:
  - id: update_weather_page
    then:
      - lambda: |-
          // Outdoor temperature
          float outdoor = id(ha_outdoor_temperature).state;
          if (!std::isnan(outdoor)) {
            char buf[12];
            snprintf(buf, sizeof(buf), "%.1f°", outdoor);
            lv_label_set_text(id(outdoor_temp_value), buf);
          }

          // Indoor temperature
          float indoor = id(ha_home_temperature).state;
          if (!std::isnan(indoor)) {
            char buf[12];
            snprintf(buf, sizeof(buf), "%.1f°C", indoor);
            lv_label_set_text(id(indoor_temp_value), buf);

            // Feels like = indoor (placeholder — hook HA sensor if available)
            snprintf(buf, sizeof(buf), "%.1f°C", indoor);
            lv_label_set_text(id(feels_like_value), buf);

            // Comfort label
            if (indoor < 16) {
              lv_label_set_text(id(comfort_label), "Cold");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0x4C9FFF), 0);
            } else if (indoor < 19) {
              lv_label_set_text(id(comfort_label), "Cool");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0x9BA2BC), 0);
            } else if (indoor < 24) {
              lv_label_set_text(id(comfort_label), "Comfortable");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0x39d19c), 0);
            } else if (indoor < 27) {
              lv_label_set_text(id(comfort_label), "Warm");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0xe7c12c), 0);
            } else {
              lv_label_set_text(id(comfort_label), "Hot");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0xf07c40), 0);
            }
          }

          // Indoor humidity
          float hum = id(ha_home_humidity).state;
          if (!std::isnan(hum)) {
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f%%", hum);
            lv_label_set_text(id(indoor_humidity_value), buf);
          }

          // Weather condition icon
          std::string cond = id(ha_weather_condition).state;
          const char* icon = "\uF0F9B";  // default cloud
          lv_color_t col = lv_color_hex(0x9BA2BC);
          if (cond == "sunny" || cond == "clear-night") {
            icon = "\uF0F97"; col = lv_color_hex(0xe7c12c);
          } else if (cond == "partlycloudy") {
            icon = "\uF0F98"; col = lv_color_hex(0x9BA2BC);
          } else if (cond == "rainy") {
            icon = "\uF0597"; col = lv_color_hex(0x4C9FFF);
          } else if (cond == "snowy") {
            icon = "\uF0598"; col = lv_color_hex(0xf2f0eb);
          } else if (cond == "lightning" || cond == "lightning-rainy") {
            icon = "\uF0599"; col = lv_color_hex(0xe7c12c);
          } else if (cond == "fog" || cond == "hail") {
            icon = "\uF059D"; col = lv_color_hex(0x9BA2BC);
          }
          lv_label_set_text(id(weather_icon_label), icon);
          lv_obj_set_style_text_color(id(weather_icon_label), col, 0);
          lv_label_set_text(id(weather_condition_text), cond.c_str());

          // Sync time
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            char tbuf[6];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d", time.hour, time.minute);
            lv_label_set_text(id(weather_time), tbuf);
          }
