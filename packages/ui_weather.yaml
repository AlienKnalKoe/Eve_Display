# ============================================================
# Eve Display — Weather / Climate Page (Page 3)
# Shows: outdoor temp, indoor temp/humidity, weather condition
# HA sensors: sensor.home_temperature, sensor.home_humidity
#             sensor.outdoor_temperature, sensor.weather_condition
# ============================================================

lvgl:
  pages:
    - id: weather_page
      bg_color: color_black
      scrollable: false
      widgets:

        # ── TOP STATUS BAR ───────────────────────────────────
        - obj:
            id: weather_status_bar
            y: 8
            width: 460
            height: 40
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            widgets:
              - label:
                  id: wifi_status_weather
                  align: left_mid
                  x: 16
                  text: "\ue934"
                  text_font: icons_24
                  text_color: color_steel_blue
              - label:
                  align: center
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "Climate"
              - label:
                  id: weather_time
                  align: right_mid
                  x: -16
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "00:00"

        # ── OUTDOOR TEMPERATURE — BIG HERO ───────────────────
        - obj:
            id: outdoor_hero_card
            y: 60
            width: 440
            height: 160
            align: top_mid
            radius: 20
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              # Weather condition icon (left)
              - label:
                  id: weather_icon_label
                  align: left_mid
                  x: 24
                  text_font: mdi_icons_52
                  text_color: color_sky_blue
                  text: "\uF0F9B"   # default: cloud

              # Outdoor temperature (center)
              - label:
                  id: outdoor_temp_value
                  align: center
                  text_font: nunito_64
                  text_color: color_white
                  text: "--°"

              # Condition description (bottom)
              - label:
                  id: weather_condition_text
                  align: bottom_mid
                  y: -12
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Unknown"

              # Outdoor label (top left)
              - label:
                  align: top_left
                  x: 16
                  y: 10
                  text_font: nunito_16
                  text_color: color_steel_blue
                  text: "Outdoor"

        # ── INDOOR CLIMATE CARD ──────────────────────────────
        - obj:
            id: indoor_card
            y: 232
            width: 440
            height: 110
            align: top_mid
            radius: 20
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              - label:
                  align: top_left
                  x: 16
                  y: 10
                  text_font: nunito_16
                  text_color: color_steel_blue
                  text: "Indoor"

              # Temperature
              - obj:
                  align: left_mid
                  x: 30
                  y: 10
                  width: 140
                  height: 64
                  bg_opa: transp
                  border_opa: transp
                  shadow_opa: transp
                  widgets:
                    - label:
                        align: top_mid
                        text_font: icons_48
                        text_color: color_orange
                        text: "\ue939"   # temperature icon
                    - label:
                        id: indoor_temp_value
                        align: bottom_mid
                        text_font: nunito_30
                        text_color: color_white
                        text: "--°C"

              # Separator
              - obj:
                  align: center
                  width: 2
                  height: 70
                  bg_color: color_steel_blue
                  border_opa: transp
                  shadow_opa: transp
                  clickable: false

              # Humidity
              - obj:
                  align: right_mid
                  x: -30
                  y: 10
                  width: 140
                  height: 64
                  bg_opa: transp
                  border_opa: transp
                  shadow_opa: transp
                  widgets:
                    - label:
                        align: top_mid
                        text_font: icons_48
                        text_color: color_sky_blue
                        text: "\ue938"   # humidity icon
                    - label:
                        id: indoor_humidity_value
                        align: bottom_mid
                        text_font: nunito_30
                        text_color: color_white
                        text: "--%"

        # ── COMFORT INDEX ────────────────────────────────────
        - obj:
            id: comfort_card
            y: 354
            width: 440
            height: 72
            align: top_mid
            radius: 16
            pad_left: 20
            pad_right: 20
            pad_top: 8
            pad_bottom: 8
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:
              - label:
                  align: left_mid
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Feels like"
              - label:
                  id: feels_like_value
                  align: center
                  text_font: nunito_30
                  text_color: color_mint
                  text: "--°C"
              - label:
                  id: comfort_label
                  align: right_mid
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Comfortable"

        # ── BOTTOM NAV ───────────────────────────────────────
        - obj:
            id: weather_bottom_nav
            y: 444
            width: 460
            height: 30
            align: top_mid
            radius: 0
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            widgets:
              - button:
                  align: left_mid
                  x: 20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: home_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF06A1"
              - button:
                  align: left_mid
                  x: 90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: energy_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF0241"
              - button:
                  align: center
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_sky_blue
                        text: "\uF0F9B"
              - button:
                  align: right_mid
                  x: -90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: scenes_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF056E"
              - button:
                  align: right_mid
                  x: -20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - script.execute: trigger_night_mode
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\uF04B2"

# ── Weather page update script ───────────────────────────────
script:
  - id: update_weather_page
    then:
      - lambda: |-
          // Outdoor temperature
          float outdoor = id(ha_outdoor_temperature).state;
          if (!std::isnan(outdoor)) {
            char buf[12];
            snprintf(buf, sizeof(buf), "%.1f°", outdoor);
            lv_label_set_text(id(outdoor_temp_value), buf);
          }

          // Indoor temperature
          float indoor = id(ha_home_temperature).state;
          if (!std::isnan(indoor)) {
            char buf[12];
            snprintf(buf, sizeof(buf), "%.1f°C", indoor);
            lv_label_set_text(id(indoor_temp_value), buf);

            // Feels like = indoor (placeholder — hook HA sensor if available)
            snprintf(buf, sizeof(buf), "%.1f°C", indoor);
            lv_label_set_text(id(feels_like_value), buf);

            // Comfort label
            if (indoor < 16) {
              lv_label_set_text(id(comfort_label), "Cold");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0x4C9FFF), 0);
            } else if (indoor < 19) {
              lv_label_set_text(id(comfort_label), "Cool");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0x9BA2BC), 0);
            } else if (indoor < 24) {
              lv_label_set_text(id(comfort_label), "Comfortable");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0x39d19c), 0);
            } else if (indoor < 27) {
              lv_label_set_text(id(comfort_label), "Warm");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0xe7c12c), 0);
            } else {
              lv_label_set_text(id(comfort_label), "Hot");
              lv_obj_set_style_text_color(id(comfort_label), lv_color_hex(0xf07c40), 0);
            }
          }

          // Indoor humidity
          float hum = id(ha_home_humidity).state;
          if (!std::isnan(hum)) {
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f%%", hum);
            lv_label_set_text(id(indoor_humidity_value), buf);
          }

          // Weather condition icon
          std::string cond = id(ha_weather_condition).state;
          const char* icon = "\uF0F9B";  // default cloud
          lv_color_t col = lv_color_hex(0x9BA2BC);
          if (cond == "sunny" || cond == "clear-night") {
            icon = "\uF0F97"; col = lv_color_hex(0xe7c12c);
          } else if (cond == "partlycloudy") {
            icon = "\uF0F98"; col = lv_color_hex(0x9BA2BC);
          } else if (cond == "rainy") {
            icon = "\uF0597"; col = lv_color_hex(0x4C9FFF);
          } else if (cond == "snowy") {
            icon = "\uF0598"; col = lv_color_hex(0xf2f0eb);
          } else if (cond == "lightning" || cond == "lightning-rainy") {
            icon = "\uF0599"; col = lv_color_hex(0xe7c12c);
          } else if (cond == "fog" || cond == "hail") {
            icon = "\uF059D"; col = lv_color_hex(0x9BA2BC);
          }
          lv_label_set_text(id(weather_icon_label), icon);
          lv_obj_set_style_text_color(id(weather_icon_label), col, 0);
          lv_label_set_text(id(weather_condition_text), cond.c_str());

          // Sync time
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            char tbuf[6];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d", time.hour, time.minute);
            lv_label_set_text(id(weather_time), tbuf);
          }
