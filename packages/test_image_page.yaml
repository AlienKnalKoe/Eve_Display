# ============================================================
# Eve Display — Image Diagnostic Test Page
#
# Tests 4 different image loading approaches on-screen so
# you can see which ones work on hardware.
#
# HOW TO REACH:
#   Settings page → scroll down → tap "Image Test" button
#   (button is added to settings_page in lvgl_pages.yaml)
#
# WHAT TO LOOK FOR:
#   Each row uses a different config. Report which A/B/C/D rows
#   show an image → tells us which config to use for Eve's head.
#
# REMOVE AFTER DIAGNOSIS:
#   1. Remove 'test_images' from eve_display.yaml packages
#   2. Remove the Image Test button block from lvgl_pages.yaml
# ============================================================

# ── Test images ───────────────────────────────────────────────
image:

  # A: 32x32 solid red square — simplest baseline
  - file: "images/test_solid_rgb.png"
    id: test_img_solid
    type: RGB
    resize: 64x64

  # B: 32x32 circle on transparent background
  - file: "images/test_rgba_circle.png"
    id: test_img_rgba
    type: RGB
    transparency: alpha_channel
    resize: 64x64

  # C: Eve head at 64x64 — same config as production
  - file: "images/head_small_64.png"
    id: test_head_small
    type: RGB
    transparency: alpha_channel
    resize: 64x64

  # D: Production head 156x156 WITHOUT transparency
  - file: "images/head-colored.png"
    id: test_head_notransp
    type: RGB
    resize: 156x156

# ── Test page ─────────────────────────────────────────────────
lvgl:
  pages:
    - id: image_test_page
      bg_color: color_black
      scrollable: true

      on_load:
        then:
          - logger.log:
              level: INFO
              format: "IMAGE TEST PAGE loaded"

      widgets:

        # Back button
        - button:
            align: top_left
            x: 8
            y: 8
            width: 72
            height: 36
            radius: 18
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            on_click:
              then:
                - lvgl.page.show: settings_page
            widgets:
              - label:
                  align: center
                  text_font: nunito_16
                  text_color: color_white
                  text: "< Back"

        # Title
        - label:
            align: top_mid
            y: 14
            text: "Image Diagnostics"
            text_font: nunito_20
            text_color: color_misty_blue

        # ── A: RGB solid ──────────────────────────────────────
        - obj:
            align: top_mid
            y: 60
            width: 440
            height: 76
            radius: 12
            bg_color: color_card_bg
            border_opa: transp
            shadow_opa: transp
            widgets:
              - image:
                  align: left_mid
                  x: 12
                  src: test_img_solid
                  bg_opa: TRANSP
              - label:
                  align: left_mid
                  x: 88
                  text_font: nunito_16
                  text_color: color_sky_blue
                  text: "A: RGB solid (32x32)"
              - label:
                  align: left_mid
                  x: 88
                  y: 18
                  text_font: nunito_16
                  text_color: color_light_gray
                  text: "type: RGB, no transparency"

        # ── B: RGBA circle ────────────────────────────────────
        - obj:
            align: top_mid
            y: 148
            width: 440
            height: 76
            radius: 12
            bg_color: color_card_bg
            border_opa: transp
            shadow_opa: transp
            widgets:
              - image:
                  align: left_mid
                  x: 12
                  src: test_img_rgba
                  bg_opa: TRANSP
              - label:
                  align: left_mid
                  x: 88
                  text_font: nunito_16
                  text_color: color_sky_blue
                  text: "B: RGBA circle (32x32)"
              - label:
                  align: left_mid
                  x: 88
                  y: 18
                  text_font: nunito_16
                  text_color: color_light_gray
                  text: "type: RGB + alpha_channel"

        # ── C: Small Eve head ─────────────────────────────────
        - obj:
            align: top_mid
            y: 236
            width: 440
            height: 76
            radius: 12
            bg_color: color_card_bg
            border_opa: transp
            shadow_opa: transp
            widgets:
              - image:
                  align: left_mid
                  x: 12
                  src: test_head_small
                  bg_opa: TRANSP
              - label:
                  align: left_mid
                  x: 88
                  text_font: nunito_16
                  text_color: color_sky_blue
                  text: "C: Eve head small (64x64)"
              - label:
                  align: left_mid
                  x: 88
                  y: 18
                  text_font: nunito_16
                  text_color: color_light_gray
                  text: "head_small_64.png + alpha_channel"

        # ── D: Full head no transparency ──────────────────────
        - obj:
            align: top_mid
            y: 324
            width: 440
            height: 172
            radius: 12
            bg_color: color_card_bg
            border_opa: transp
            shadow_opa: transp
            widgets:
              - image:
                  align: center
                  y: 10
                  src: test_head_notransp
                  bg_opa: TRANSP
              - label:
                  align: top_left
                  x: 12
                  y: 8
                  text_font: nunito_16
                  text_color: color_sky_blue
                  text: "D: Eve head 156x156 (no alpha)"
              - label:
                  align: bottom_left
                  x: 12
                  y: -8
                  text_font: nunito_16
                  text_color: color_light_gray
                  text: "head-colored.png, type: RGB only"
