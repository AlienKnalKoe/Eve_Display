# ══════════════════════════════════════════════════════════════
# ── SETTINGS PAGE — SYSTEM INFO ───────────────────────────────
# ══════════════════════════════════════════════════════════════

  # Internal CPU temperature
  - platform: internal_temperature
    id: cpu_temp
    name: "CPU Temperature"
    update_interval: 30s
    on_value:
      then:
        - lvgl.label.update:
            id: settings_cpu_temp
            text: !lambda |
              char buf[20]; snprintf(buf,sizeof(buf),"CPU: %.1f°C",x); return buf;

  # Free heap
  - platform: template
    id: free_heap
    name: "Free Heap"
    update_interval: 30s
    unit_of_measurement: "KB"
    lambda: "return esp_get_free_heap_size() / 1024.0f;"
    on_value:
      then:
        - lvgl.label.update:
            id: settings_heap
            text: !lambda |
              char buf[20]; snprintf(buf,sizeof(buf),"RAM: %d KB",(int)x); return buf;

  # Uptime
  - platform: uptime
    id: uptime_sensor
    name: "Uptime"
    update_interval: 60s
    on_value:
      then:
        - lvgl.label.update:
            id: settings_uptime
            text: !lambda |
              int s = (int)x;
              int h = s/3600; int m = (s%3600)/60;
              char buf[20];
              if(h>0) snprintf(buf,sizeof(buf),"up %dh %dm",h,m);
              else snprintf(buf,sizeof(buf),"up %dm",m);
              return std::string(buf);

  # WiFi RSSI
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    update_interval: 60s
    on_value:
      then:
        - lvgl.label.update:
            id: settings_wifi_rssi
            text: !lambda |
              char buf[12]; snprintf(buf,sizeof(buf),"%d dBm",(int)x); return buf;

# WiFi SSID for settings page
button:
  - platform: restart
    id: restart_btn_internal
    name: "Restart"
