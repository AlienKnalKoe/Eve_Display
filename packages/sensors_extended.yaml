# ============================================================
# Eve Display — Extended sensors (vacuum, climate, blinds, settings)
# Added as separate package to avoid duplicate key conflicts.
# ============================================================

text_sensor:
  # ── Vacuum state ──
  - platform: homeassistant
    id: ha_vacuum_state
    entity_id: vacuum.robot_vacuum
    on_value:
      then:
        - lvgl.label.update:
            id: vacuum_state_label
            text: !lambda "return x.c_str();"

  # ── WiFi info (for settings page) ──
  - platform: wifi_info
    ssid:
      id: wifi_ssid_info
      name: "WiFi SSID"
      on_value:
        then:
          - lvgl.label.update:
              id: settings_wifi_ssid
              text: !lambda |
                return "WiFi: " + x;
    ip_address:
      id: wifi_ip_info
      name: "IP Address"
      on_value:
        then:
          - lvgl.label.update:
              id: settings_ip
              text: !lambda "return x;"

sensor:
  - platform: homeassistant
    id: ha_vacuum_battery
    entity_id: vacuum.robot_vacuum
    attribute: battery_level
    on_value:
      then:
        - lvgl.label.update:
            id: vacuum_battery_label
            text: !lambda |
              char buf[8];
              snprintf(buf, sizeof(buf), "%d%%", (int)x);
              return std::string(buf);

  - platform: homeassistant
    id: ha_vacuum_fan_speed
    entity_id: vacuum.robot_vacuum
    attribute: fan_speed
    on_value:
      then:
        - lvgl.label.update:
            id: vacuum_fan_speed_label
            text: !lambda "return std::to_string((int)x);"

# ══════════════════════════════════════════════════════════════
# ── FLOOR HEATING / CLIMATE ───────────────────────────────────
# ══════════════════════════════════════════════════════════════

  - platform: homeassistant
    id: ha_floor_heat_target
    entity_id: climate.floor_heating
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update:
            id: floor_heat_target_label
            text: !lambda |
              char buf[8];
              snprintf(buf, sizeof(buf), "%.1f°", x);
              return std::string(buf);

  - platform: homeassistant
    id: ha_floor_heat_current
    entity_id: climate.floor_heating
    attribute: current_temperature
    on_value:
      then: []

# Floor heating on/off state
  - platform: homeassistant
    id: ha_floor_heat_hvac_action
    entity_id: climate.floor_heating
    attribute: hvac_action
    on_value:
      then: []

