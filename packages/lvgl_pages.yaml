        # ── ROOM TOGGLE BUTTONS ──────────────────────────────
        # Row 1: All + Bedroom 1 + Bedroom 2
        - obj:
            id: dinner_room_row1
            y: 156
            width: 440
            height: 68
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:
              # All rooms
              - button:
                  id: dinner_all_btn
                  align: left_mid
                  x: 8
                  width: 130
                  height: 58
                  radius: 14
                  bg_color: color_slate_blue_gray
                  border_color: color_steel_blue
                  border_width: 2
                  shadow_opa: transp
                  checkable: true
                  on_click:
                    then:
                      - lambda: |-
                          bool checked = lv_obj_has_state(id(dinner_all_btn), LV_STATE_CHECKED);
                          // When "All" is checked, check all room buttons
                          if (checked) {
                            lv_obj_add_state(id(dinner_bed1_btn), LV_STATE_CHECKED);
                            lv_obj_add_state(id(dinner_bed2_btn), LV_STATE_CHECKED);
                            lv_obj_add_state(id(dinner_bed3_btn), LV_STATE_CHECKED);
                            lv_obj_add_state(id(dinner_bed4_btn), LV_STATE_CHECKED);
                            lv_obj_add_state(id(dinner_downstairs_btn), LV_STATE_CHECKED);
                          } else {
                            lv_obj_clear_state(id(dinner_bed1_btn), LV_STATE_CHECKED);
                            lv_obj_clear_state(id(dinner_bed2_btn), LV_STATE_CHECKED);
                            lv_obj_clear_state(id(dinner_bed3_btn), LV_STATE_CHECKED);
                            lv_obj_clear_state(id(dinner_bed4_btn), LV_STATE_CHECKED);
                            lv_obj_clear_state(id(dinner_downstairs_btn), LV_STATE_CHECKED);
                          }
                  widgets:
                    - label:
                        align: top_mid
                        y: 6
                        text_font: mdi_icons_28
                        text_color: color_mint
                        text: "\U000F06A1"   # home
                    - label:
                        align: bottom_mid
                        y: -4
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "All"
