            bg_color: color_card_bg
            border_opa: transp
            shadow_opa: transp
            widgets:
              - label:
                  align: left_mid
                  x: 16
                  text_font: mdi_icons_28
                  text_color: color_yellow
                  text: "\U000F0335"   # mdi:brightness-6
              - label:
                  align: left_mid
                  x: 54
                  text_font: nunito_16
