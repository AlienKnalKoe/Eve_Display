# ── Boot sequence ────────────────────────────────────────────
# ESPHome executes on_boot after all components are ready
esphome:
  on_boot:
    priority: -200
    then:
      - lvgl.page.show: loading_page
      - script.execute: update_clock
      - delay: 500ms
      - lvgl.bar.update:
          id: loading_bar
          value: 100
          animated: true
      - delay: 3s
      - lvgl.page.show:
          id: home_page
          animation: fade_in
          time: 400ms
