                  checkable: true
                  widgets:
                    - label:
                        align: top_mid
                        y: 6
                        text_font: mdi_icons_28
                        text_color: color_amber
                        text: "\U000F06A1"   # home
                    - label:
                        align: bottom_mid
                        y: -4
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Downstairs"

        # ── SEND BUTTON ──────────────────────────────────────
        - button:
            id: dinner_send_btn
            y: 316
            width: 440
            height: 72
            align: top_mid
            radius: 20
            bg_color: 0x2a4a1a
            border_color: color_mint
            border_width: 2
            shadow_opa: transp
            on_click:
              then:
                - lambda: |-
                    // Flash button green for feedback
                    lv_obj_set_style_bg_color(id(dinner_send_btn),
                      lv_color_hex(0x3a6a2a), LV_PART_MAIN);
                - if:
                    condition:
                      lambda: 'return lv_obj_has_state(id(dinner_bed1_btn), LV_STATE_CHECKED);'
                    then:
                      - homeassistant.action:
                          action: tts.speak
                          data:
                            entity_id: tts.google_en_com
                            media_player_entity_id: media_player.bedroom_1_speaker
                            message: "Dinner is ready!"
                - if:
                    condition:
                      lambda: 'return lv_obj_has_state(id(dinner_bed2_btn), LV_STATE_CHECKED);'
                    then:
                      - homeassistant.action:
                          action: tts.speak
                          data:
                            entity_id: tts.google_en_com
                            media_player_entity_id: media_player.bedroom_2_speaker
                            message: "Dinner is ready!"
                - if:
                    condition:
                      lambda: 'return lv_obj_has_state(id(dinner_bed3_btn), LV_STATE_CHECKED);'
                    then:
                      - homeassistant.action:
                          action: tts.speak
                          data:
                            entity_id: tts.google_en_com
                            media_player_entity_id: media_player.bedroom_3_speaker
                            message: "Dinner is ready!"
                - if:
                    condition:
                      lambda: 'return lv_obj_has_state(id(dinner_bed4_btn), LV_STATE_CHECKED);'
                    then:
                      - homeassistant.action:
                          action: tts.speak
                          data:
                            entity_id: tts.google_en_com
                            media_player_entity_id: media_player.bedroom_4_speaker
                            message: "Dinner is ready!"
                - if:
                    condition:
                      lambda: 'return lv_obj_has_state(id(dinner_downstairs_btn), LV_STATE_CHECKED);'
                    then:
                      - homeassistant.action:
                          action: tts.speak
                          data:
                            entity_id: tts.google_en_com
                            media_player_entity_id: media_player.downstairs_speaker
                            message: "Dinner is ready!"
                - delay: 400ms
                - lambda: |-
                    lv_obj_set_style_bg_color(id(dinner_send_btn),
                      lv_color_hex(0x2a4a1a), LV_PART_MAIN);
            widgets:
              - label:
                  align: left_mid
                  x: 24
                  text_font: mdi_icons_40
                  text_color: color_mint
                  text: "\U000F019C"   # fork-knife
              - label:
                  align: center
                  text_font: nunito_24
                  text_color: color_mint
                  text: "Dinner is ready!"
              - label:
                  align: right_mid
                  x: -20
                  text_font: nunito_16
                  text_color: color_steel_blue
                  text: "Announce"

        # ── STATUS FEEDBACK LABEL ────────────────────────────
        - label:
            id: dinner_feedback_label
            y: 400
            align: top_mid
            text_font: nunito_16
            text_color: color_mint
            text: ""

        # ── BOTTOM NAV ───────────────────────────────────────
        - obj:
            id: dinner_bottom_nav
            y: 444
            width: 460
            height: 30
            align: top_mid
            radius: 0
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            widgets:
              - button:
                  align: left_mid
                  x: 10
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: home_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F06A1"
              - button:
                  align: center
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: scenes_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_sky_blue
                        text: "\U000F056E"   # scenes (active)
              - button:
                  align: right_mid
                  x: -10
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: laundry_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F058A"   # washing machine

# ── SETTINGS PAGE ────────────────────────────────────────────
