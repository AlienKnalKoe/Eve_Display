# ============================================================
# Eve Display — LVGL pages (all 4 pages in one block)
# Single lvgl: block to ensure reliable ESPHome compilation.
# displays/touchscreens link LVGL to the hardware.
# ============================================================

lvgl:
  pages:
    # ── LOADING SCREEN ──────────────────────────────────────
    # First page shown on boot. Uses ONLY hardcoded hex values —
    # no color/font IDs — so it renders even if other packages
    # haven't registered their IDs yet.
    - id: loading_page
      bg_color: 0x0d0d1a
      scrollable: false

      widgets:
        - obj:
            align: center
            y: -60
            width: 200
            height: 200
            radius: 100
            bg_color: 0x1a1a3a
            border_color: 0x9b59b6
            border_width: 3
            shadow_opa: transp
            widgets:
              - label:
                  align: center
                  text: "Eve"
                  text_font: montserrat_48
                  text_color: 0xe8d5ff
        - label:
            align: center
            y: 110
            text: "Starting up..."
            text_font: montserrat_14
            text_color: 0x8899aa
        - bar:
            id: loading_bar
            align: center
            y: 150
            width: 240
            height: 6
            radius: 3
            bg_color: 0x2a2a4a
            indicator:
              bg_color: 0x9b59b6
            value: 0
            animated: true

    - id: home_page
      bg_color: color_black
      scrollable: false
      widgets:

        # ── TOP STATUS BAR ──────────────────────────────────
        - obj:
            id: status_bar
            y: 8
            width: 460
            height: 40
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            widgets:

              - label:
                  id: wifi_status
                  align: left_mid
                  x: 16
                  text: "\ue934"
                  text_font: icons_24
                  text_color: color_steel_blue

              - label:
                  id: ha_status
                  align: left_mid
                  x: 52
                  text: "\U000F07D0"
                  text_font: mdi_icons_28
                  text_color: color_steel_blue

              # Page title
              - label:
                  id: page_title_home
                  align: center
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "Eve"

              # Time mini in status bar (right side)
              - label:
                  id: status_time
                  align: right_mid
                  x: -16
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "00:00"

        # ── SETTINGS GEAR (long-press → settings page) ────────
        # Red gear in top-right corner — long-press to enter settings
        - button:
            id: settings_gear_btn
            align: top_right
            x: -8
            y: 8
            width: 40
            height: 40
            radius: 20
            bg_color: 0x1a0000
            border_width: 1
            border_color: 0xaa2222
            shadow_opa: transp
            on_long_press:
              then:
                - lvgl.page.show:
                    id: settings_page
                    animation: fade_in
                    time: 300ms
            widgets:
              - label:
                  align: center
                  text_font: mdi_icons_28
                  text_color: 0xcc3333
                  text: "\U000F0493"   # mdi:cog

        # ── MAIN CLOCK CARD ──────────────────────────────────
        - obj:
            id: main_card
            y: 56
            width: 440
            height: 160
            align: top_mid
            radius: 20
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            scrollable: false
            widgets:

              - label:
                  id: time_value
                  y: 10
                  align: top_mid
                  text_font: nunito_64
                  text_color: color_misty_blue
                  text: "00:00"

              - obj:
                  y: 82
                  align: top_mid
                  width: 380
                  height: 2
                  bg_color: color_steel_blue
                  border_opa: transp
                  shadow_opa: transp
                  clickable: false

              - label:
                  id: day_of_week_value
                  x: 24
                  y: -14
                  align: bottom_left
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Sunday"

              - label:
                  id: date_value
                  x: -24
                  y: -14
                  align: bottom_right
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "8, March"

        # ── EVE CIRCLE + SIDE BUTTONS ────────────────────────
        - obj:
            id: eve_row
            y: 228
            width: 440
            height: 164
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              # LEFT button — navigate to energy page
              - button:
                  id: eve_btn_left
                  x: 10
                  align: left_mid
                  width: 70
                  height: 70
                  radius: 35
                  pad_all: 0
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_width: 6
                  shadow_color: color_black
                  shadow_opa: cover
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: energy_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_40
                        text_color: color_amber
                        text: "\U000F0241"   # flash/power = energy

              # CENTER: Eve face — layered head + eyes + mouth
              - obj:
                  id: eve_circle
                  align: center
                  width: 156
                  height: 156
                  radius: 78
                  pad_all: 0
                  bg_color: color_black
                  border_opa: transp
                  shadow_opa: transp
                  clip_corner: true
                  clickable: false
                  widgets:
                    # Layer 1: Head base
                    - image:
                        id: eve_image
                        align: center
                        src: head_colored

                    # Layer 2: Eyes (positioned ~35% down, centered)
                    - image:
                        id: eve_eye_layer
                        align: center
                        y: -16
                        src: eye_open

                    # Layer 3: Mouth (positioned ~64% down, centered)
                    - image:
                        id: eve_mouth_layer
                        align: center
                        y: 30
                        src: mouth_normal

              # RIGHT button — navigate to scenes page
              - button:
                  id: eve_btn_right
                  x: -10
                  align: right_mid
                  width: 70
                  height: 70
                  radius: 35
                  pad_all: 0
                  bg_color: color_slate_blue_gray
                  border_opa: transp
                  shadow_width: 6
                  shadow_color: color_black
                  shadow_opa: cover
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: scenes_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_sky_blue
                        text: "\U000F056E"   # devices

        # ── TICKER BAR ───────────────────────────────────────
        - obj:
            id: ticker_bar
            y: 402
            width: 440
            height: 32
            align: top_mid
            radius: 8
            pad_left: 12
            pad_right: 12
            pad_top: 4
            pad_bottom: 4
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:
              - label:
                  id: ticker_label
                  align: left_mid
                  width: 416
                  text_font: nunito_16
                  text_color: color_misty_blue
                  long_mode: SCROLL_CIRCULAR
                  anim_time: 10000ms
                  text: "Eve Display ready  ·  Touch to wake  ·  Home Assistant connected  ·  "

        # ── BOTTOM NAV BAR ───────────────────────────────────
        - obj:
            id: bottom_nav
            y: 444
            width: 460
            height: 30
            align: top_mid
            radius: 0
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            widgets:

              # Home (active)
              - button:
                  id: nav_home_btn
                  align: left_mid
                  x: 20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: home_page
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_sky_blue
                        text: "\U000F06A1"

              # Energy
              - button:
                  id: nav_energy_btn
                  align: left_mid
                  x: 90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: energy_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F0241"   # flash

              # Weather
              - button:
                  id: nav_weather_btn
                  align: center
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: weather_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F0F9B"   # cloud

              # Scenes
              - button:
                  id: nav_scenes_nav_btn
                  align: right_mid
                  x: -90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: scenes_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F056E"

              # Settings/sleep
              - button:
                  id: nav_settings_btn
                  align: right_mid
                  x: -20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - script.execute: trigger_night_mode
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F04B2"   # sleep

# ── Clock / date update script ───────────────────────────────
    - id: energy_page
      bg_color: color_black
      scrollable: false
      widgets:

        # ── TOP STATUS BAR ───────────────────────────────────
        - obj:
            id: energy_status_bar
            y: 8
            width: 460
            height: 40
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            widgets:

              - label:
                  id: wifi_status_energy
                  align: left_mid
                  x: 16
                  text: "\ue934"
                  text_font: icons_24
                  text_color: color_steel_blue

              - label:
                  id: ha_status_energy
                  align: left_mid
                  x: 52
                  text: "\U000F07D0"
                  text_font: mdi_icons_28
                  text_color: color_steel_blue

              - label:
                  align: center
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "Energy"

              - label:
                  id: energy_time
                  align: right_mid
                  x: -16
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "00:00"

        # ── GRID USAGE ARC ───────────────────────────────────
        - obj:
            id: grid_arc_container
            y: 60
            width: 200
            height: 200
            align: top_left
            x: 16
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              - arc:
                  id: grid_arc
                  align: center
                  width: 180
                  height: 180
                  arc_color: color_deep_orange
                  arc_width: 12
                  indicator:
                    arc_color: color_orange
                    arc_width: 12
                  bg_color: color_slate_blue_gray
                  value: 0
                  min_value: 0
                  max_value: 6000
                  start_angle: 135
                  end_angle: 45
                  adjustable: false

              # Center: usage watts
              - label:
                  id: grid_power_value
                  align: center
                  y: 0
                  text_font: nunito_36
                  text_color: color_orange
                  text: "-- W"

              - label:
                  align: center
                  y: 40
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Grid"

              # Icon above value inside arc
              - label:
                  align: center
                  y: -38
                  text_font: mdi_icons_28
                  text_color: color_orange
                  text: "\U000F0241"   # flash

        # ── SOLAR ARC ────────────────────────────────────────
        - obj:
            id: solar_arc_container
            y: 60
            width: 200
            height: 200
            align: top_right
            x: -16
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              - arc:
                  id: solar_arc
                  align: center
                  width: 180
                  height: 180
                  arc_color: color_dark_gray
                  arc_width: 12
                  indicator:
                    arc_color: color_yellow
                    arc_width: 12
                  bg_color: color_slate_blue_gray
                  value: 0
                  min_value: 0
                  max_value: 6000
                  start_angle: 135
                  end_angle: 45
                  adjustable: false

              - label:
                  id: solar_power_value
                  align: center
                  y: 0
                  text_font: nunito_36
                  text_color: color_yellow
                  text: "-- W"

              - label:
                  align: center
                  y: 40
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Solar"

              - label:
                  align: center
                  y: -38
                  text_font: mdi_icons_28
                  text_color: color_yellow
                  text: "\U000F1107"   # solar panel icon

        # ── NET USAGE CARD ───────────────────────────────────
        - obj:
            id: net_card
            y: 272
            width: 440
            height: 80
            align: top_mid
            radius: 16
            pad_left: 20
            pad_right: 20
            pad_top: 8
            pad_bottom: 8
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:
              - label:
                  align: left_mid
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Net"
              - label:
                  id: net_power_value
                  align: center
                  text_font: nunito_36
                  text_color: color_mint
                  text: "-- W"
              - label:
                  id: net_power_direction
                  align: right_mid
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "balanced"

        # ── QUICK STATS ROW ──────────────────────────────────
        - obj:
            id: energy_stats_row
            y: 366
            width: 440
            height: 64
            align: top_mid
            radius: 16
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:
              # Grid cost today (placeholder)
              - obj:
                  align: left_mid
                  x: 16
                  width: 120
                  height: 52
                  bg_opa: transp
                  border_opa: transp
                  shadow_opa: transp
                  widgets:
                    - label:
                        align: center
                        y: -10
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Today Grid"
                    - label:
                        id: grid_today_value
                        align: center
                        y: 10
                        text_font: nunito_16
                        text_color: color_orange
                        text: "-- kWh"

              # Separator
              - obj:
                  align: center
                  x: 0
                  width: 2
                  height: 40
                  bg_color: color_steel_blue
                  border_opa: transp
                  shadow_opa: transp
                  clickable: false

              # Solar today (placeholder)
              - obj:
                  align: right_mid
                  x: -16
                  width: 120
                  height: 52
                  bg_opa: transp
                  border_opa: transp
                  shadow_opa: transp
                  widgets:
                    - label:
                        align: center
                        y: -10
                        text_font: nunito_16
                        text_color: color_misty_blue
                        text: "Today Solar"
                    - label:
                        id: solar_today_value
                        align: center
                        y: 10
                        text_font: nunito_16
                        text_color: color_yellow
                        text: "-- kWh"

        # ── BOTTOM NAV ───────────────────────────────────────
        - obj:
            id: energy_bottom_nav
            y: 444
            width: 460
            height: 30
            align: top_mid
            radius: 0
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            widgets:
              - button:
                  align: left_mid
                  x: 20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: home_page
                          animation: move_right
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F06A1"

              - button:
                  align: left_mid
                  x: 90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_sky_blue
                        text: "\U000F0241"

              - button:
                  align: center
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: weather_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F0F9B"

              - button:
                  align: right_mid
                  x: -90
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - lvgl.page.show:
                          id: scenes_page
                          animation: move_left
                          time: 300ms
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F056E"

              - button:
                  align: right_mid
                  x: -20
                  width: 60
                  height: 28
                  bg_opa: transp
                  shadow_opa: transp
                  border_opa: transp
                  on_click:
                    then:
                      - script.execute: trigger_night_mode
                  widgets:
                    - label:
                        align: center
                        text_font: mdi_icons_28
                        text_color: color_misty_blue
                        text: "\U000F04B2"

# ── Energy page update script ────────────────────────────────
    - id: weather_page
      bg_color: color_black
      scrollable: false
      widgets:

        # ── TOP STATUS BAR ───────────────────────────────────
        - obj:
            id: weather_status_bar
            y: 8
            width: 460
            height: 40
            align: top_mid
            pad_all: 0
            bg_opa: transp
            border_opa: transp
            shadow_opa: transp
            widgets:
              - label:
                  id: wifi_status_weather
                  align: left_mid
                  x: 16
                  text: "\ue934"
                  text_font: icons_24
                  text_color: color_steel_blue
              - label:
                  align: center
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "Climate"
              - label:
                  id: weather_time
                  align: right_mid
                  x: -16
                  text_font: nunito_20
                  text_color: color_misty_blue
                  text: "00:00"

        # ── OUTDOOR TEMPERATURE — BIG HERO ───────────────────
        - obj:
            id: outdoor_hero_card
            y: 60
            width: 440
            height: 160
            align: top_mid
            radius: 20
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              # Weather condition icon (left)
              - label:
                  id: weather_icon_label
                  align: left_mid
                  x: 24
                  text_font: mdi_icons_52
                  text_color: color_sky_blue
                  text: "\U000F0F9B"   # default: cloud

              # Outdoor temperature (center)
              - label:
                  id: outdoor_temp_value
                  align: center
                  text_font: nunito_64
                  text_color: color_white
                  text: "--°"

              # Condition description (bottom)
              - label:
                  id: weather_condition_text
                  align: bottom_mid
                  y: -12
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Unknown"

              # Outdoor label (top left)
              - label:
                  align: top_left
                  x: 16
                  y: 10
                  text_font: nunito_16
                  text_color: color_steel_blue
                  text: "Outdoor"

        # ── INDOOR CLIMATE CARD ──────────────────────────────
        - obj:
            id: indoor_card
            y: 232
            width: 440
            height: 110
            align: top_mid
            radius: 20
            pad_all: 0
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:

              - label:
                  align: top_left
                  x: 16
                  y: 10
                  text_font: nunito_16
                  text_color: color_steel_blue
                  text: "Indoor"

              # Temperature - icon left, value right
              - obj:
                  align: left_mid
                  x: 20
                  y: 10
                  width: 160
                  height: 64
                  bg_opa: transp
                  border_opa: transp
                  shadow_opa: transp
                  widgets:
                    - label:
                        align: left_mid
                        x: 8
                        text_font: icons_28
                        text_color: color_orange
                        text: "\ue939"   # temperature icon
                    - label:
                        id: indoor_temp_value
                        align: right_mid
                        x: -8
                        text_font: nunito_30
                        text_color: color_white
                        text: "--°C"

              # Separator
              - obj:
                  align: center
                  width: 2
                  height: 70
                  bg_color: color_steel_blue
                  border_opa: transp
                  shadow_opa: transp
                  clickable: false

              # Humidity - icon left, value right
              - obj:
                  align: right_mid
                  x: -20
                  y: 10
                  width: 160
                  height: 64
                  bg_opa: transp
                  border_opa: transp
                  shadow_opa: transp
                  widgets:
                    - label:
                        align: left_mid
                        x: 8
                        text_font: icons_28
                        text_color: color_sky_blue
                        text: "\ue938"   # humidity icon
                    - label:
                        id: indoor_humidity_value
                        align: right_mid
                        x: -8
                        text_font: nunito_30
                        text_color: color_white
                        text: "--%"

        # ── COMFORT INDEX ────────────────────────────────────
        - obj:
            id: comfort_card
            y: 354
            width: 440
            height: 72
            align: top_mid
            radius: 16
            pad_left: 20
            pad_right: 20
            pad_top: 8
            pad_bottom: 8
            bg_color: color_slate_blue_gray
            border_opa: transp
            shadow_opa: transp
            clickable: false
            widgets:
              - label:
                  align: left_mid
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Feels like"
              - label:
                  id: feels_like_value
                  align: center
                  text_font: nunito_30
                  text_color: color_mint
                  text: "--°C"
              - label:
                  id: comfort_label
                  align: right_mid
                  text_font: nunito_16
                  text_color: color_misty_blue
                  text: "Comfortable"

        # ── BOTTOM NAV ───────────────────────────────────────
